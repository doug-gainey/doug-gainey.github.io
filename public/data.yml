    position: Enterprise Front-End Architect
    timePeriod: Sep 2022 - Feb 2026
    description:
      - Served as highest-level frontend technical authority across 10+ engineering teams and 8+ enterprise SaaS applications, defining architecture standards and driving modernization efforts across a large-scale .NET-based enterprise environment.
