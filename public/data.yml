about: Principal Software Engineer with 20+ years of experience designing, modernizing, and scaling enterprise applications across .NET and frontend platforms. Deep expertise in C#, ASP.NET, SQL Server, and frontend architecture, with a strong focus on system modernization, design systems, and platform engineering.
  Proven technical leader with experience driving cross-team architecture initiatives, migrating legacy enterprise systems to modern frameworks, and improving engineering velocity through CI/CD practices and AI-assisted development tools. Hands-on engineer who partners closely with product, design, and engineering teams to deliver scalable, maintainable software systems.

experience:
